name: Android CI (Auto-Pilot Pintar)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-apk:
    name: Build APK Tanpa Bawel
    runs-on: ubuntu-latest

    steps:
    - name: 1. Ambil Kodingan
      uses: actions/checkout@v4

    - name: 2. Perbaiki Izin gradlew
      run: chmod +x gradlew || true

    - name: 3. Deteksi Angka Jodoh Otomatis (Robot AI)
      id: detektif-gradle
      run: |
        FILE="gradle/wrapper/gradle-wrapper.properties"
        VER=""
        if [ -f "$FILE" ]; then
          VER=$(tr -d '\r' < "$FILE" | grep -oP 'gradle-\K[0-9]+(\.[0-9]+)+' | head -n 1)
        fi
        
        if [ -z "$VER" ]; then
          echo "File tidak terbaca, pakai angka aman: 8.2"
          VER="8.2"
        else
          echo "Ketemu versi asli kodingan Anda: $VER"
        fi
        echo "versi=$VER" >> $GITHUB_OUTPUT

    - name: 4. Siapkan Gradle Sesuai Deteksi
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: ${{ steps.detektif-gradle.outputs.versi }}

    - name: 5. Pasang Pelindung Anti-Crash (Env & Firebase)
      run: |
        touch .env
        echo "BASE_URL=https://dummy.com" > .env
        
        mkdir -p app
        echo '{"project_info":{"project_id":"dummy"},"client":[{"client_info":{"android_client_info":{"package_name":"com.dummy"}},"api_key":[{}]}]}' > app/google-services.json

    - name: 6. Siapkan Mesin Java (JDK 21)
      uses: actions/setup-java@v4
      with:
        java-version: '21' # <--- INI OBATNYA, UPGRADE KE JAVA 21
        distribution: 'temurin'

    - name: 7. Rakit APK (God Mode)
      env:
        JAVA_TOOL_OPTIONS: "-Djava.awt.headless=true"
      run: |
        if [ -f "./gradlew" ]; then
          ./gradlew assembleDebug --no-daemon --stacktrace -x lint -x test -Pksp.incremental=false --no-configuration-cache
        else
          gradle assembleDebug --no-daemon --stacktrace -x lint -x test -Pksp.incremental=false --no-configuration-cache
        fi

    - name: 8. Ambil File APK-nya
      uses: actions/upload-artifact@v4
      with:
        name: Aplikasi-Android-Debug
        path: '**/build/outputs/apk/debug/*.apk'
