name: Android CI (Sinkronisasi Sempurna)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-apk:
    name: Build APK Tanpa Bawel
    runs-on: ubuntu-latest

    steps:
    - name: 1. Ambil Kodingan
      uses: actions/checkout@v4

    # URUTAN BENAR: Instal Java DULU sebelum yang lain
    - name: 2. Siapkan Mesin Java (Wajib JDK 21)
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    # SETELAH Java siap, baru nyalakan Gradle yang sanggup membaca Java 21
    - name: 3. Siapkan Mesin Gradle (Versi 8.7)
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: '8.7'

    - name: 4. Pasang Pelindung Anti-Crash (Env & Firebase)
      run: |
        touch .env
        echo "BASE_URL=https://dummy.com" > .env
        
        mkdir -p app
        echo '{"project_info":{"project_id":"dummy"},"client":[{"client_info":{"android_client_info":{"package_name":"com.dummy"}},"api_key":[{}]}]}' > app/google-services.json

    - name: 5. Rakit APK (God Mode)
      env:
        JAVA_TOOL_OPTIONS: "-Djava.awt.headless=true"
      run: |
        gradle assembleDebug --no-daemon --stacktrace -x lint -x test -Pksp.incremental=false --no-configuration-cache

    - name: 6. Ambil File APK-nya
      uses: actions/upload-artifact@v4
      with:
        name: Aplikasi-Android-Debug
        path: '**/build/outputs/apk/debug/*.apk'
