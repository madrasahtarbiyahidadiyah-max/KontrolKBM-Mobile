name: Android CI (Pawang Versi)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-apk:
    name: Build APK Tanpa Bawel
    runs-on: ubuntu-latest

    steps:
    - name: 1. Ambil Kodingan
      uses: actions/checkout@v4

    - name: 2. Intip Jodoh Aslinya (Langkah Detektif)
      run: |
        echo "=== MENCARI WRAPPER ==="
        if [ -f "gradle/wrapper/gradle-wrapper.properties" ]; then
          cat gradle/wrapper/gradle-wrapper.properties
        else
          echo "Waduh, file gradle-wrapper.properties gaib!"
        fi

    - name: 3. Siapkan Mesin Java (JDK 17)
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: 4. Siapkan Gradle (Mode Auto-Pilot)
      uses: gradle/actions/setup-gradle@v4
      # PERHATIKAN: Baris "gradle-version" sengaja saya hapus total di sini!
      # Ini akan memaksa GitHub membaca file di Langkah 2 secara otomatis.

    - name: 5. Rakit APK (God Mode)
      env:
        JAVA_TOOL_OPTIONS: "-Djava.awt.headless=true"
      run: |
        if [ -f "./gradlew" ]; then
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace -x lint -x test -Pksp.incremental=false --no-configuration-cache
        else
          gradle assembleDebug --no-daemon --stacktrace -x lint -x test -Pksp.incremental=false --no-configuration-cache
        fi

    - name: 6. Ambil File APK-nya
      uses: actions/upload-artifact@v4
      with:
        name: Aplikasi-Android-Debug
        path: '**/build/outputs/apk/debug/*.apk'
