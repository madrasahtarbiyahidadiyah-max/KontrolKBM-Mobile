name: Android CI (Sapu Bersih Cache)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-apk:
    name: Build APK Tanpa Bawel
    runs-on: ubuntu-latest

    steps:
    - name: 1. Ambil Kodingan
      uses: actions/checkout@v4

    - name: 2. Siapkan Mesin Java (Wajib JDK 21)
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: 3. Siapkan Mesin Gradle (Kunci di 8.10.2)
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: '8.10.2' # Versi paling aman untuk Java 21 dan Android modern

    - name: 4. Pasang Pelindung Anti-Crash (Env & Firebase)
      run: |
        echo "BASE_URL=https://dummy.com" > .env
        echo "API_KEY=12345" >> .env
        
        mkdir -p app
        echo '{"project_info":{"project_id":"dummy"},"client":[{"client_info":{"android_client_info":{"package_name":"com.dummy"}},"api_key":[{}]}]}' > app/google-services.json

    - name: 5. Rakit APK (Mode Total Clean)
      env:
        JAVA_TOOL_OPTIONS: "-Djava.awt.headless=true"
      run: |
        # Kita tambahkan 'clean' dan '--no-build-cache' untuk mengosongkan cache lama yang rusak
        gradle clean assembleDebug --no-daemon --stacktrace -x lint -x test -Pksp.incremental=false --no-configuration-cache --no-build-cache

    - name: 6. Ambil File APK-nya
      uses: actions/upload-artifact@v4
      with:
        name: Aplikasi-Android-Debug
        path: '**/build/outputs/apk/debug/*.apk'
