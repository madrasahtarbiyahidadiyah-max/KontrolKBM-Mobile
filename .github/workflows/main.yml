name: Android CI (Perekam Kotak Hitam)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-apk:
    name: Build APK & Rekam Log
    runs-on: ubuntu-latest

    steps:
    - name: 1. Tarik Kodingan
      uses: actions/checkout@v4

    - name: 2. Pasang Java 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: 3. Pasang Gradle 9.3.1 (Kunci Utama)
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: '9.3.1'

    - name: 4. Buat File Pelindung
      run: |
        echo "BASE_URL=https://dummy.com" > .env
        echo "API_KEY=123456789" >> .env
        echo "sdk.dir=$ANDROID_HOME" > local.properties
        mkdir -p app
        echo '{"project_info":{"project_id":"dummy"},"client":[{"client_info":{"android_client_info":{"package_name":"com.dummy"}},"api_key":[{}]}]}' > app/google-services.json

    - name: 5. Rakit APK (Menyimpan seluruh teks ke file rahasia)
      run: |
        echo "Memulai perakitan... Jika gagal, log akan disimpan sebagai file Download."
        gradle clean assembleDebug --stacktrace -x lint -x test > eksekusi_log.txt 2>&1

    - name: 6. Simpan File APK-nya (Jika Sukses)
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: Aplikasi-Android-Debug
        path: '**/build/outputs/apk/debug/*.apk'

    - name: 7. KUMPULKAN BUKTI ERROR (Hanya Jika Gagal)
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: BUKTI-ERROR-LENGKAP
        path: eksekusi_log.txt
