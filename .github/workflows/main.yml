name: Android CI (Ultra God Mode)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-apk:
    name: Build APK Tanpa Bawel
    runs-on: ubuntu-latest

    steps:
    - name: 1. Ambil Kodingan
      uses: actions/checkout@v4

    - name: 2. Siapkan Mesin Java (JDK 17)
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: 3. Siapkan Gradle Darurat
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: 'current'

    - name: 4. Rakit APK (Anti KSP Crash)
      env:
        JAVA_TOOL_OPTIONS: "-Djava.awt.headless=true"
      run: |
        if [ -f "./gradlew" ]; then
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace -x lint -x test -Pksp.incremental=false -Djava.awt.headless=true
        else
          gradle assembleDebug --no-daemon --stacktrace -x lint -x test -Pksp.incremental=false -Djava.awt.headless=true
        fi

    - name: 5. Ambil File APK-nya
      uses: actions/upload-artifact@v4
      with:
        name: Aplikasi-Android-Debug
        path: '**/build/outputs/apk/debug/*.apk'
