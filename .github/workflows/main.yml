name: Android CI (Angka Keramat)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-apk:
    name: Build APK Tanpa Bawel
    runs-on: ubuntu-latest

    steps:
    - name: 1. Ambil Kodingan
      uses: actions/checkout@v4

    - name: 2. Pasang Pelindung Anti-Crash (Env & Firebase)
      run: |
        touch .env
        echo "BASE_URL=https://dummy.com" > .env
        
        mkdir -p app
        echo '{"project_info":{"project_id":"dummy"},"client":[{"client_info":{"android_client_info":{"package_name":"com.dummy"}},"api_key":[{}]}]}' > app/google-services.json

    - name: 3. Siapkan Mesin Java (JDK 17)
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: 4. Siapkan Gradle (Angka Keramat 8.10.2)
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: '8.10.2' # <--- KITA KUNCI MATI DI SINI

    - name: 5. Rakit APK (God Mode)
      env:
        JAVA_TOOL_OPTIONS: "-Djava.awt.headless=true"
      run: |
        if [ -f "./gradlew" ]; then
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace -x lint -x test -Pksp.incremental=false --no-configuration-cache
        else
          gradle assembleDebug --no-daemon --stacktrace -x lint -x test -Pksp.incremental=false --no-configuration-cache
        fi

    - name: 6. Ambil File APK-nya
      uses: actions/upload-artifact@v4
      with:
        name: Aplikasi-Android-Debug
        path: '**/build/outputs/apk/debug/*.apk'
