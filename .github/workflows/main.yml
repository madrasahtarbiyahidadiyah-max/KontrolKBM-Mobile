# ... (kode bagian atas dari 'name:' sampai 'setup JDK 17' biarkan sama)

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # --- BAGIAN DI BAWAH INI YANG DIGANTI ---

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: 'current' # Mendownload Gradle versi stabil terbaru

    - name: Build Debug APK
      run: gradle assembleDebug   # Perhatikan: tidak pakai tanda titik-miring (./) lagi

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk
